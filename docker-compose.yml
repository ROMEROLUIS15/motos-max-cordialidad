services:
  postgres:
    image: postgres:16-alpine
    container_name: motoworkshop_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: motoworkshop
      POSTGRES_PASSWORD: motoworkshop
      POSTGRES_DB: motoworkshop_dev
    ports:
      # 5433 on the host to avoid clashing with a native Postgres on 5432.
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - motoworkshop-net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U motoworkshop']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: motoworkshop_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - motoworkshop-net
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  agents:
    build:
      context: ./apps/agents
    container_name: motoworkshop_agents
    restart: unless-stopped
    # Shares the repo-root .env.local (JWT_SECRET, DEEPSEEK/GROQ keys, R2, Sentry).
    env_file:
      - .env.local
    environment:
      # The NestJS API runs on the host (or Render in prod), not in compose.
      API_BASE_URL: ${AGENTS_API_BASE_URL:-http://host.docker.internal:3001}
      REDIS_URL: redis://redis:6379
      TZ: America/Bogota
      # The shared .env.local sets PORT=3001 (the NestJS API's port); override it
      # so uvicorn binds the port this service actually exposes. Render injects
      # its own $PORT, so this only matters for local compose.
      PORT: 8000
    ports:
      - '8000:8000'
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    networks:
      - motoworkshop-net

networks:
  motoworkshop-net:
    driver: bridge

volumes:
  redis_data:
    driver: local
  postgres_data:
    driver: local
