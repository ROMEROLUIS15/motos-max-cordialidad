version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: motoworkshop_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: motoworkshop
      POSTGRES_PASSWORD: motoworkshop
      POSTGRES_DB: motoworkshop_dev
    ports:
      # 5433 on the host to avoid clashing with a native Postgres on 5432.
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U motoworkshop']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: motoworkshop_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:
    driver: local
  postgres_data:
    driver: local
