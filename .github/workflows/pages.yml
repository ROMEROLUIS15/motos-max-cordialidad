name: Deploy to Cloudflare Pages

# Manual fallback deploy. The Cloudflare Pages Git integration is what deploys
# on every push to main — keep this workflow_dispatch-only to avoid double
# deploys. Secrets CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID are configured.
on:
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  deploy-pages:
    name: Deploy Web to Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Same build the Cloudflare Git integration runs: next-on-pages wraps
      # `next build` and emits the static output Pages expects. Publishing raw
      # `.next` does NOT work on Cloudflare Pages.
      - name: Build web (next-on-pages)
        run: cd apps/web && npx @cloudflare/next-on-pages@1
        env:
          # The app appends /api/... itself — this must be the bare API origin.
          # Falls back to the production API so a missing repo var never ships
          # a build pointing at localhost.
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || 'https://motoworkshop-api.onrender.com' }}

      - name: Publish to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: motos-max-cordialidad
          directory: apps/web/.vercel/output/static
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
