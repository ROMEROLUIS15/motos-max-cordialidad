name: Deploy to Cloudflare Pages

# Manual fallback deploy. CI (ci.yml deploy-web) is what deploys on every push
# to main — keep this workflow_dispatch-only to avoid double deploys.
#
# INCIDENT 2026-07-04: this workflow used to build next-on-pages in Actions
# and upload the artifact with `wrangler pages deploy`. That artifact's worker
# crashed on every dynamic route ([id] pages → 500) while the same code built
# by Cloudflare's own build environment worked. Deploys now trigger the
# server-side Pages build via API — same method as ci.yml. Do not bring the
# wrangler upload back (and never add a wrangler.toml under apps/web: wrangler
# would sync it into the project settings and clobber them).
on:
  workflow_dispatch:

jobs:
  deploy-pages:
    name: Deploy Web to Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cloudflare Pages build (server-side)
        run: |
          resp=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/pages/projects/motos-max-cordialidad/deployments" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -F "branch=main")
          http_code=$(echo "$resp" | tail -1)
          body=$(echo "$resp" | sed '$d')
          id=$(echo "$body" | jq -r '.result.id // empty')
          if [ -z "$id" ]; then
            echo "::error::Could not create Pages deployment (HTTP $http_code): $body"
            exit 1
          fi
          echo "DEPLOYMENT_ID=$id" >> "$GITHUB_ENV"
          echo "Triggered Pages deployment $id"

      - name: Wait for Cloudflare build to go live
        run: |
          for i in $(seq 1 40); do
            stage=$(curl -sf \
              "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/pages/projects/motos-max-cordialidad/deployments/$DEPLOYMENT_ID" \
              -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
              | jq -r '.result.latest_stage | .name + ":" + .status')
            echo "[$i] $stage"
            case "$stage" in
              deploy:success) exit 0 ;;
              *:failure) echo "::error::Cloudflare Pages build failed at $stage"; exit 1 ;;
            esac
            sleep 15
          done
          echo "::error::Timed out waiting for the Cloudflare Pages build"
          exit 1

      - name: Verify dynamic route (edge worker health)
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
            "https://motos-max-cordialidad.pages.dev/customers/00000000-0000-0000-0000-000000000000")
          echo "GET /customers/<uuid> -> $code"
          if [ "$code" = "500" ]; then
            echo "::error::Dynamic routes are crashing (500) — the edge worker is broken."
            exit 1
          fi
