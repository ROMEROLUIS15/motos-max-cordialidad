name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Burst protection: PR runs are cancelled when a newer push supersedes them;
# pushes to main are QUEUED instead (never cancel a run that may be mid-deploy)
# and GitHub collapses intermediate pending runs to the newest one.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @motoworkshop/api db:generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Typecheck API
        run: pnpm --filter @motoworkshop/api typecheck

      - name: Typecheck Web
        run: pnpm --filter @motoworkshop/web typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @motoworkshop/api db:generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      # --coverage enforces the coverage floor in the jest config
      # (statements 50 / branches 8 / functions 30 / lines 50).
      # NOTE: `pnpm run script -- --flag` passes a literal "--" to jest,
      # which then treats --flag as a test path pattern — use exec instead.
      - name: Test API (with coverage floor)
        run: pnpm --filter @motoworkshop/api exec jest --coverage --ci

      - name: Test Web
        run: pnpm --filter @motoworkshop/web test:ci

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ESLint on the API is type-aware (imports @prisma/client), so the
      # generated client must exist before linting.
      - name: Generate Prisma Client
        run: pnpm --filter @motoworkshop/api db:generate

      - name: Lint API
        run: pnpm --filter @motoworkshop/api lint

      - name: Lint Web
        run: pnpm --filter @motoworkshop/web lint

  agents:
    name: Agents (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/agents
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          version: '0.11.19'

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check src tests

      - name: Format check (ruff)
        run: uv run ruff format --check src tests

      - name: Type-check (mypy)
        run: uv run mypy src

      - name: Test (pytest)
        run: uv run pytest -q

  # Integration tests against a disposable Postgres. `prisma migrate deploy`
  # doubles as the MIGRATIONS GATE: a migration that cannot apply cleanly to a
  # fresh database fails here instead of at container boot in production.
  e2e-api:
    name: E2E API
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: motoworkshop_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      # The app boots the full module graph — bullmq (WhatsApp queue) connects
      # to Redis at init and floods the tests with ECONNREFUSED without it.
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/motoworkshop_test
      REDIS_URL: redis://localhost:6379
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @motoworkshop/api db:generate

      - name: Apply migrations (migrations gate)
        run: pnpm --filter @motoworkshop/api exec prisma migrate deploy

      - name: Run API e2e tests
        run: pnpm --filter @motoworkshop/api test:e2e

  # Playwright against the real Next.js app. Only the mocked spec runs here
  # (API calls intercepted with page.route) — the "real API" spec needs a
  # full backend and stays local-only.
  e2e-web:
    name: E2E Web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright chromium
        run: pnpm --filter @motoworkshop/web exec playwright install --with-deps chromium

      - name: Run Playwright tests (mocked API)
        run: pnpm --filter @motoworkshop/web exec playwright test e2e/password-recovery.spec.ts --project=chromium

  # Secret scanning over the full git history of the push/PR.
  secrets:
    name: Secrets scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Dependency audit budget: HIGH+ vulnerabilities in PRODUCTION deps block
  # the pipeline. Known-accepted advisories are listed in the root
  # package.json under pnpm.auditConfig.ignoreGhsas (each must have a reason
  # in docs/memory). Dev-tool vulnerabilities do not block (--prod).
  audit:
    name: Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level high

  # ── Quality gate deploy ────────────────────────────────────────────────
  # Frontend production deploy runs ONLY when every check above passed, and
  # only for pushes to main (never PRs). The Cloudflare Git integration's
  # automatic production builds are disabled — this job is the deploy path.
  # The API/agents (Render) gate themselves via autoDeployTrigger: checksPass.
  deploy-web:
    name: Deploy Web (Cloudflare Pages)
    needs: [typecheck, test, lint, agents, e2e-api, e2e-web, secrets, audit]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          # wrangler 4.x requires Node >= 22
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web (next-on-pages)
        run: cd apps/web && npx @cloudflare/next-on-pages@1
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || 'https://motoworkshop-api.onrender.com' }}

      # WARNING: do NOT add a wrangler.toml under apps/web — wrangler would
      # sync it into the Cloudflare project settings and break them (see
      # pages.yml for the full story). CLI flags only.
      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          command: pages deploy .vercel/output/static --project-name=motos-max-cordialidad --branch=main

  # Post-deploy smoke test: a deploy that reports "success" can still serve a
  # broken site (it happened: a config sync wiped the nodejs_compat flag and
  # every page rendered an error). Verify real pages return real content.
  smoke-web:
    name: Smoke test Web
    needs: [deploy-web]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Verify production pages
        run: |
          for path in / /login /reset-password/help; do
            ok=false
            for attempt in 1 2 3 4; do
              body=$(curl -sf --max-time 30 "https://motos-max-cordialidad.pages.dev$path") || { sleep 15; continue; }
              if echo "$body" | grep -q 'nodejs_compat'; then
                echo "$path -> next-on-pages ERROR PAGE (attempt $attempt)"; sleep 15; continue
              fi
              echo "$path -> OK"; ok=true; break
            done
            if [ "$ok" != true ]; then
              echo "::error::SMOKE TEST FAILED on $path — site may be broken."
              echo "Rollback: Cloudflare dashboard -> Workers & Pages -> motos-max-cordialidad -> Deployments -> previous deployment -> Rollback"
              exit 1
            fi
          done

  # API deploy is orchestrated from CI (Render autoDeployTrigger=off): trigger
  # the deploy, wait until it is live, then verify health. Doing it here (vs
  # Render's checksPass) lets the pipeline SEE deploy failures — checksPass
  # only gates the start and reports nothing back.
  deploy-api:
    name: Deploy API (Render)
    needs: [typecheck, test, lint, agents, e2e-api, e2e-web, secrets, audit]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      SERVICE_ID: srv-d8un6nurnols73ff7kj0
    steps:
      - name: Trigger deploy
        id: trigger
        run: |
          deploy=$(curl -sf -X POST "https://api.render.com/v1/services/$SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" -H "Content-Type: application/json" \
            -d "{\"commitId\": \"${{ github.sha }}\"}")
          echo "id=$(echo "$deploy" | jq -r .id)" >> "$GITHUB_OUTPUT"

      - name: Wait until live
        run: |
          for i in $(seq 1 45); do
            sleep 20
            status=$(curl -sf "https://api.render.com/v1/services/$SERVICE_ID/deploys/${{ steps.trigger.outputs.id }}" \
              -H "Authorization: Bearer $RENDER_API_KEY" | jq -r .status)
            echo "deploy status: $status"
            case "$status" in
              live) exit 0 ;;
              build_failed|update_failed|canceled|deactivated) echo "::error::Render deploy failed ($status)"; exit 1 ;;
            esac
          done
          echo "::error::Timed out waiting for Render deploy"; exit 1

      - name: Smoke test API
        run: |
          for attempt in 1 2 3 4; do
            status=$(curl -sf --max-time 30 https://motoworkshop-api.onrender.com/api/health | jq -r .status) && \
              [ "$status" = "ok" ] && { echo "API health OK"; exit 0; }
            sleep 15
          done
          echo "::error::API health check failed after deploy"; exit 1

  # Agents deploy only when apps/agents changed — same trigger+wait pattern.
  deploy-agents:
    name: Deploy Agents (Render)
    needs: [typecheck, test, lint, agents, e2e-api, e2e-web, secrets, audit]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      SERVICE_ID: srv-d8vkfre8bjmc738d2nqg
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 2

      - name: Detect agents changes
        id: changes
        run: |
          before="${{ github.event.before }}"
          if [ "$before" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$before" 2>/dev/null; then
            range="HEAD^..HEAD"
          else
            range="$before..HEAD"
          fi
          if git diff --name-only "$range" | grep -q '^apps/agents/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "apps/agents unchanged — skipping deploy"
          fi

      - name: Trigger deploy
        id: trigger
        if: steps.changes.outputs.changed == 'true'
        run: |
          deploy=$(curl -sf -X POST "https://api.render.com/v1/services/$SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" -H "Content-Type: application/json" \
            -d "{\"commitId\": \"${{ github.sha }}\"}")
          echo "id=$(echo "$deploy" | jq -r .id)" >> "$GITHUB_OUTPUT"

      - name: Wait until live
        if: steps.changes.outputs.changed == 'true'
        run: |
          for i in $(seq 1 45); do
            sleep 20
            status=$(curl -sf "https://api.render.com/v1/services/$SERVICE_ID/deploys/${{ steps.trigger.outputs.id }}" \
              -H "Authorization: Bearer $RENDER_API_KEY" | jq -r .status)
            echo "deploy status: $status"
            case "$status" in
              live) exit 0 ;;
              build_failed|update_failed|canceled|deactivated) echo "::error::Render deploy failed ($status)"; exit 1 ;;
            esac
          done
          echo "::error::Timed out waiting for Render deploy"; exit 1

      - name: Smoke test Agents
        if: steps.changes.outputs.changed == 'true'
        run: |
          for attempt in 1 2 3 4; do
            curl -sf --max-time 30 https://motoworkshop-agents.onrender.com/health > /dev/null && { echo "Agents health OK"; exit 0; }
            sleep 15
          done
          echo "::error::Agents health check failed after deploy"; exit 1

  # Email the owner when any deploy or smoke test fails on main. GitHub's own
  # notifications depend on personal settings; this one always arrives.
  notify-failure:
    name: Notify deploy failure
    needs: [deploy-web, smoke-web, deploy-api, deploy-agents]
    if: failure() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Send failure email (Resend)
        run: |
          curl -sf -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"from\": \"CI Motos Max <onboarding@resend.dev>\",
              \"to\": [\"motosmaxcordialidad@gmail.com\"],
              \"subject\": \"🔴 Deploy FALLIDO — ${{ github.repository }} (${GITHUB_SHA:0:7})\",
              \"html\": \"<p>Un deploy a producción falló.</p><p><b>Commit:</b> ${{ github.sha }}</p><p><b>Run:</b> <a href=\\\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\\\">ver detalles en GitHub Actions</a></p><p>El sitio sigue sirviendo la última versión buena. Revisa el run para diagnosticar.</p>\"
            }"
