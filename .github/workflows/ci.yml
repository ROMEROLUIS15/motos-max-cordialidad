name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @motoworkshop/api db:generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Typecheck API
        run: pnpm --filter @motoworkshop/api typecheck

      - name: Typecheck Web
        run: pnpm --filter @motoworkshop/web typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @motoworkshop/api db:generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Test API
        run: pnpm --filter @motoworkshop/api test:ci

      - name: Test Web
        run: pnpm --filter @motoworkshop/web test:ci

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ESLint on the API is type-aware (imports @prisma/client), so the
      # generated client must exist before linting.
      - name: Generate Prisma Client
        run: pnpm --filter @motoworkshop/api db:generate

      - name: Lint API
        run: pnpm --filter @motoworkshop/api lint

      - name: Lint Web
        run: pnpm --filter @motoworkshop/web lint

  agents:
    name: Agents (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/agents
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          version: '0.11.19'

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check src tests

      - name: Format check (ruff)
        run: uv run ruff format --check src tests

      - name: Type-check (mypy)
        run: uv run mypy src

      - name: Test (pytest)
        run: uv run pytest -q
