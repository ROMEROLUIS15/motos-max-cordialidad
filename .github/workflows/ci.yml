name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @motoworkshop/api db:generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Typecheck API
        run: pnpm --filter @motoworkshop/api typecheck

      - name: Typecheck Web
        run: pnpm --filter @motoworkshop/web typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @motoworkshop/api db:generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Test API
        run: pnpm --filter @motoworkshop/api test:ci

      - name: Test Web
        run: pnpm --filter @motoworkshop/web test:ci

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ESLint on the API is type-aware (imports @prisma/client), so the
      # generated client must exist before linting.
      - name: Generate Prisma Client
        run: pnpm --filter @motoworkshop/api db:generate

      - name: Lint API
        run: pnpm --filter @motoworkshop/api lint

      - name: Lint Web
        run: pnpm --filter @motoworkshop/web lint

  agents:
    name: Agents (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/agents
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          version: '0.11.19'

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check src tests

      - name: Format check (ruff)
        run: uv run ruff format --check src tests

      - name: Type-check (mypy)
        run: uv run mypy src

      - name: Test (pytest)
        run: uv run pytest -q

  # ── Quality gate deploy ────────────────────────────────────────────────
  # Frontend production deploy runs ONLY when every check above passed, and
  # only for pushes to main (never PRs). The Cloudflare Git integration's
  # automatic production builds are disabled — this job is the deploy path.
  # The API/agents (Render) gate themselves via autoDeployTrigger: checksPass.
  deploy-web:
    name: Deploy Web (Cloudflare Pages)
    needs: [typecheck, test, lint, agents]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          # wrangler 4.x requires Node >= 22
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web (next-on-pages)
        run: cd apps/web && npx @cloudflare/next-on-pages@1
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || 'https://motoworkshop-api.onrender.com' }}

      # WARNING: do NOT add a wrangler.toml under apps/web — wrangler would
      # sync it into the Cloudflare project settings and break them (see
      # pages.yml for the full story). CLI flags only.
      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          command: pages deploy .vercel/output/static --project-name=motos-max-cordialidad --branch=main
