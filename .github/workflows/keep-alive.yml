name: Keep services awake

# Pings the free-tier health endpoints so Render instances do not sleep.
# Not needed on the "starter" plan (always-on). Set these repo variables
# (Settings → Secrets and variables → Actions → Variables):
#   API_HEALTH_URL    e.g. https://motoworkshop-api.onrender.com/api/health
#   AGENTS_HEALTH_URL e.g. https://motoworkshop-agents.onrender.com/health
# Each is optional; an unset URL is skipped. Keeping the agents service awake
# matters because its in-process scheduler (reports/stock alerts) only fires
# while the instance is running.
on:
  schedule:
    - cron: '*/5 * * * *' # every 5 minutes
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoints
        run: |
          ping_url() {
            local url="$1"
            [ -z "$url" ] && { echo "(unset — skipping)"; return 0; }
            for i in 1 2 3; do
              code=$(curl -fsS -o /dev/null -w "%{http_code}" --max-time 30 "$url" && echo ok || echo fail)
              echo "  $url attempt $i: $code"
              [ "$code" = "ok" ] && return 0
              sleep 15
            done
            echo "  $url: all pings failed (may be cold-starting); not failing the job."
          }
          echo "API:"
          ping_url "${{ vars.API_HEALTH_URL }}"
          echo "Agents:"
          ping_url "${{ vars.AGENTS_HEALTH_URL }}"
