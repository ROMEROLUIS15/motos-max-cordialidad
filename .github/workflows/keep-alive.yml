name: Keep API awake

# Pings the API health endpoint so a Render free-tier instance does not sleep.
# Not needed on the "starter" plan (always-on). Set the repo variable
# API_HEALTH_URL (Settings → Secrets and variables → Actions → Variables) to
# e.g. https://motoworkshop-api.onrender.com/api/health
on:
  schedule:
    - cron: '*/10 * * * *' # every 10 minutes
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          URL="${{ vars.API_HEALTH_URL }}"
          if [ -z "$URL" ]; then
            echo "API_HEALTH_URL not set — skipping."
            exit 0
          fi
          for i in 1 2 3; do
            code=$(curl -fsS -o /dev/null -w "%{http_code}" --max-time 30 "$URL" && echo ok || echo fail)
            echo "attempt $i: $code"
            [ "$code" = "ok" ] && exit 0
            sleep 15
          done
          echo "All pings failed (instance may be cold-starting); not failing the job."
