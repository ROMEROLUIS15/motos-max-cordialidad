# Render Blueprint — backend API (NestJS).
# Create via Render Dashboard → "New +" → "Blueprint" → connect this repo.
# Secrets (sync: false) are entered in the Render dashboard, not committed here.
services:
  - type: web
    name: motoworkshop-api
    runtime: docker
    repo: https://github.com/ROMEROLUIS15/motos-max-cordialidad
    branch: main
    dockerfilePath: apps/api/Dockerfile
    dockerContext: .
    region: virginia # closest to Neon (us-east-1)
    # "free" sleeps after 15 min idle → the keep-alive.yml workflow pings
    # /api/health every 10 min so the WebSocket/worker/cron keep running.
    # Bump to "starter" (always-on, no keep-alive needed) once there is traffic.
    plan: free
    healthCheckPath: /api/health
    autoDeploy: true
    # Migrations + start are baked into the image CMD (see apps/api/Dockerfile),
    # so no dockerCommand override here — Render's parser mangled the quotes.
    # On a paid plan you could instead use: preDeployCommand: npx prisma migrate deploy
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      # --- Secrets: set these in the Render dashboard ---
      - key: DATABASE_URL # Neon connection string
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: REDIS_URL # Render Key Value or Upstash (optional; WhatsApp queue)
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: WHATSAPP_APP_SECRET
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false
      # URL of the Python agents service (admin WhatsApp routing). Set in the
      # dashboard to the agents service's onrender.com URL once it exists.
      - key: AGENTS_BASE_URL
        sync: false
      # --- Email (password reset) ---
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: '587'
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: FRONTEND_URL
        value: https://motos-max-cordialidad.pages.dev
      - key: ALLOWED_ORIGINS
        value: https://motos-max-cordialidad.pages.dev

  # Fase 2 — Python agents microservice (AgentAdmin, reports, stock alerts).
  - type: web
    name: motoworkshop-agents
    runtime: docker
    repo: https://github.com/ROMEROLUIS15/motos-max-cordialidad
    branch: main
    dockerfilePath: apps/agents/Dockerfile
    dockerContext: apps/agents
    region: virginia
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: API_BASE_URL
        value: https://motoworkshop-api.onrender.com
      - key: TZ
        value: America/Bogota
      - key: SCHEDULER_ENABLED
        value: 'true'
      - key: ADMIN_SESSION_TTL_SECONDS
        value: '7200'
      # --- Secrets: set these in the Render dashboard ---
      - key: JWT_SECRET # MUST match the API's JWT_SECRET (service tokens)
        sync: false
      - key: REDIS_URL
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: SENTRY_DSN
        sync: false
