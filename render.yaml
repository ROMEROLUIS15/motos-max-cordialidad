# Render Blueprint — backend API (NestJS).
# Create via Render Dashboard → "New +" → "Blueprint" → connect this repo.
# Secrets (sync: false) are entered in the Render dashboard, not committed here.
services:
  - type: web
    name: motoworkshop-api
    runtime: docker
    repo: https://github.com/ROMEROLUIS15/motos-max-cordialidad
    branch: main
    dockerfilePath: apps/api/Dockerfile
    dockerContext: .
    region: virginia # closest to Neon (us-east-1)
    # "free" sleeps after 15 min idle → the keep-alive.yml workflow pings
    # /api/health every 10 min so the WebSocket/worker/cron keep running.
    # Bump to "starter" (always-on, no keep-alive needed) once there is traffic.
    plan: free
    healthCheckPath: /api/health
    autoDeploy: true
    # Free plan has no preDeployCommand, so run migrations at container start
    # (idempotent). On a paid plan you can drop this and use preDeployCommand.
    dockerCommand: sh -c "npx prisma migrate deploy && node dist/main"
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      # --- Secrets: set these in the Render dashboard ---
      - key: DATABASE_URL # Neon connection string
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: REDIS_URL # Render Key Value or Upstash (optional; WhatsApp queue)
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: WHATSAPP_APP_SECRET
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false
